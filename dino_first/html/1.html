<html>
    <head>
        <title>Html button</title>
    </head>
    <body>
        <h1>This is button</h1>

        <button type="button">OK</button>

        <button onclick="callfor()">Call Function</button>

        <script>
            function callfor()
            {
                alert("Function call");
            }
        </script>
    </body>
</html>
